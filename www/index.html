<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' data: gap: https://ssl.gstatic.com;
             style-src 'self' 'unsafe-inline';
             script-src 'self' 'unsafe-inline' 'unsafe-eval';
             img-src 'self' data: content:;" />
  <title>RUthirsty 拨号</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 顶部导航栏 -->
  <header class="app-header">
    <h1 class="app-title">联系人</h1>
    <button class="icon-btn" id="btn-search" aria-label="搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </header>

  <!-- 搜索栏（默认隐藏） -->
  <div class="search-bar" id="search-bar">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="搜索姓名或号码…" autocomplete="off" />
      <button class="clear-btn" id="btn-clear-search" aria-label="清除">✕</button>
    </div>
  </div>

  <!-- 主内容区 -->
  <main class="main-content" id="main-content">

    <!-- 加载中 -->
    <div class="state-view" id="state-loading">
      <div class="spinner"></div>
      <p>正在读取联系人…</p>
    </div>

    <!-- 权限被拒绝 -->
    <div class="state-view hidden" id="state-denied">
      <div class="state-icon">🔒</div>
      <p>需要联系人访问权限</p>
      <button class="btn-primary" id="btn-retry-permission">重新授权</button>
    </div>

    <!-- 无联系人 -->
    <div class="state-view hidden" id="state-empty">
      <div class="state-icon">📭</div>
      <p>未找到联系人</p>
    </div>

    <!-- 联系人列表 -->
    <div class="hidden" id="contacts-section">
      <div class="contact-count" id="contact-count"></div>
      <!-- 字母索引导航 -->
      <div class="alpha-nav" id="alpha-nav"></div>
      <!-- 联系人列表主体 -->
      <ul class="contact-list" id="contact-list" role="list"></ul>
    </div>

  </main>

  <!-- 拨号确认弹窗 -->
  <div class="modal-overlay hidden" id="call-modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-avatar" id="modal-avatar"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-number" id="modal-number"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel-call">取消</button>
        <button class="btn-call" id="btn-confirm-call">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4
              1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1
              1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1
              1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
          </svg>
          拨打
        </button>
      </div>
    </div>
  </div>

  <!-- 拨号盘入口 FAB -->
  <button class="fab" id="btn-dialpad" aria-label="打开拨号盘">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4
        1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1
        1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1
        1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
    </svg>
  </button>

  <!-- 拨号盘面板 -->
  <div class="dialpad-overlay hidden" id="dialpad-overlay">
    <div class="dialpad-panel">
      <div class="dialpad-header">
        <button class="icon-btn dialpad-close" id="btn-dialpad-close" aria-label="关闭">✕</button>
        <span>拨号盘</span>
      </div>
      <div class="dialpad-display">
        <span id="dialpad-number"></span>
        <button class="backspace-btn hidden" id="btn-backspace" aria-label="删除">⌫</button>
      </div>
      <div class="dialpad-grid">
        <button class="dial-key" data-digit="1"><span class="digit">1</span><span class="sub"></span></button>
        <button class="dial-key" data-digit="2"><span class="digit">2</span><span class="sub">ABC</span></button>
        <button class="dial-key" data-digit="3"><span class="digit">3</span><span class="sub">DEF</span></button>
        <button class="dial-key" data-digit="4"><span class="digit">4</span><span class="sub">GHI</span></button>
        <button class="dial-key" data-digit="5"><span class="digit">5</span><span class="sub">JKL</span></button>
        <button class="dial-key" data-digit="6"><span class="digit">6</span><span class="sub">MNO</span></button>
        <button class="dial-key" data-digit="7"><span class="digit">7</span><span class="sub">PQRS</span></button>
        <button class="dial-key" data-digit="8"><span class="digit">8</span><span class="sub">TUV</span></button>
        <button class="dial-key" data-digit="9"><span class="digit">9</span><span class="sub">WXYZ</span></button>
        <button class="dial-key" data-digit="*"><span class="digit">*</span><span class="sub"></span></button>
        <button class="dial-key" data-digit="0"><span class="digit">0</span><span class="sub">+</span></button>
        <button class="dial-key" data-digit="#"><span class="digit">#</span><span class="sub"></span></button>
      </div>
      <div class="dialpad-actions">
        <button class="btn-dial-call" id="btn-dial-call" disabled aria-label="拨打">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4
              1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1
              1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1
              1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="cordova.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
