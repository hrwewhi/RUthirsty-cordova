<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' data: gap: https://ssl.gstatic.com;
             style-src 'self' 'unsafe-inline';
             script-src 'self' 'unsafe-inline' 'unsafe-eval';
             img-src 'self' data: content:;" />
  <title>联系人拨号</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 加载中 -->
  <div class="state-view" id="state-loading">
    <div class="spinner"></div>
    <p>正在读取联系人…</p>
  </div>

  <!-- 权限被拒绝 -->
  <div class="state-view hidden" id="state-denied">
    <div class="state-icon">🔒</div>
    <p>需要联系人访问权限</p>
    <button class="btn-retry" id="btn-retry">重新授权</button>
  </div>

  <!-- 无联系人 -->
  <div class="state-view hidden" id="state-empty">
    <div class="state-icon">📭</div>
    <p>未找到联系人</p>
  </div>

  <!-- 主界面 -->
  <div class="main-view hidden" id="main-view">

    <!-- 联系人姓名（点击朗读） -->
    <button class="contact-name" id="contact-name" aria-label="点击朗读姓名"></button>

    <!-- 联系人头像（点击直接拨号） -->
    <button class="avatar-btn" id="contact-avatar" aria-label="点击拨号"></button>

    <!-- 电话号码（点击直接拨号） -->
    <button class="phone-btn" id="contact-phone" aria-label="点击拨号"></button>

    <!-- 上一个 / 下一个 -->
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev">
        <span class="nav-arrow">◀</span>
        <span class="nav-label">上一个</span>
      </button>
      <button class="nav-btn" id="btn-next">
        <span class="nav-label">下一个</span>
        <span class="nav-arrow">▶</span>
      </button>
    </div>

    <!-- 序号提示 -->
    <div class="contact-index" id="contact-index"></div>

  </div>

  <script src="cordova.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
