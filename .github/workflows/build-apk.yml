name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Android build tools
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"

      - name: Install Cordova CLI
        run: npm install -g cordova@12

      - name: Add Android platform
        run: cordova platform add android@12 --nofetch

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-contacts-x@2.1.2
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-statusbar

      - name: Build Debug APK
        run: cordova build android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        run: |
          APK=platforms/android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh $APK
