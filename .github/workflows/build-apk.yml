name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Node.js 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. 安装 Cordova CLI
      - name: Install Cordova CLI
        run: npm install -g cordova@12

      # 5. 安装项目依赖
      - name: Install npm dependencies
        run: npm install
        working-directory: /home/runner/work/RUthirsty-cordova/RUthirsty-cordova

      # 6. 添加 Android 平台
      - name: Add Android platform
        run: cordova platform add android@12 --save

      # 7. 安装插件
      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-contacts-x --save || true
          cordova plugin add cordova-plugin-device --save || true
          cordova plugin add cordova-plugin-statusbar --save || true

      # 8. 构建 Debug APK
      - name: Build Debug APK
        run: cordova build android

      # 9. 上传 APK 为 Artifact（可直接下载）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 10. 打印 APK 信息
      - name: Print APK info
        run: |
          APK=platforms/android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ 构建成功"
          echo "📦 文件：$APK"
          echo "📏 大小：$(du -sh $APK | cut -f1)"
